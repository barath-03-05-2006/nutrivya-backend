# ── Database ─────────────────────────────────────────────────────────
# No real values are hardcoded here — every sensitive field MUST be
# supplied via environment variables (locally via your run configuration,
# in production via Render's Environment Variables dashboard).
#
# Local dev defaults to MySQL. In production, set DB_URL and DB_DRIVER
# to point at Supabase Postgres instead — DB_USERNAME/DB_PASSWORD stay
# the same property names either way. Example production values:
#   DB_URL=jdbc:postgresql://<supabase-host>:5432/postgres
#   DB_DRIVER=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:nutrivya}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── JWT ──────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

server.port=${SERVER_PORT:8080}

# ── Mail (Gmail SMTP) ────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ── Default seeded dietitian account ──────────────────────────────
app.seed.admin.email=${SEED_ADMIN_EMAIL:divya@nutrivya.co.in}
app.seed.admin.username=${SEED_ADMIN_USERNAME:divya}
app.seed.admin.password=${SEED_ADMIN_PASSWORD}
app.seed.admin.fullname=${SEED_ADMIN_FULLNAME:Dt. Divya}

# ── Photo upload settings ─────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB